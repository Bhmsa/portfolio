<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin Login - Royal Fashion Hub. Authorized personnel only.">
    <meta name="robots" content="noindex, nofollow">
    <meta name="author" content="Royal Fashion Hub">
    <meta name="theme-color" content="#c2185b">

    <title>Admin Login | Royal Fashion Hub</title>

    <!-- Favicon -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👑</text></svg>">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- ========== Login Section ========== -->
    <section class="login-section">
        <div class="login-card">
            <!-- Logo -->
            <div class="login-logo">
                <div style="font-size: 2.5rem; margin-bottom: 0.5rem;">👑</div>
                <h2>Royal <span>Fashion Hub</span></h2>
                <p>Admin Dashboard Login</p>
            </div>

            <!-- Error Message -->
            <div class="login-error" id="loginError"></div>

            <!-- Login Form -->
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" placeholder="admin@royalfashionhub.com" autocomplete="email"
                        required>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password"
                        autocomplete="current-password" required>
                </div>

                <button type="submit" class="btn btn-primary" id="loginBtn">
                    Sign In
                </button>
            </form>

            <!-- Footer -->
            <div class="login-footer">
                <p><a href="index.html">← Back to Website</a></p>
            </div>
        </div>
    </section>

    <!-- ========== Scripts ========== -->
    <script type="module">
        import { initLoginPage } from './js/auth.js';

        // Initialize login page functionality
        initLoginPage();
    </script>

</body>

</html>
